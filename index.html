<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sozialplaner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="loading-spinner"></div>
  <div style="font-size:14px;color:var(--muted);">Daten werden geladen…</div>
</div>

<div id="toast-container"></div>

<!-- Login Screen -->
<div id="login-screen" style="display:none;">
  <div class="login-box">
    <div class="login-title">Sozialplaner</div>
    <div class="login-sub">Melde dich an, um fortzufahren.</div>
    <div class="card">
      <div class="form-row full"><label>E-Mail</label><input id="login-email" type="email" placeholder="name@beispiel.de" autocomplete="email"/></div>
      <div class="form-row full"><label>Passwort</label><input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <div class="login-error" id="login-error"></div>
      <button class="btn btn-primary" id="login-btn" style="width:100%;">Anmelden</button>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <nav id="main-nav">
    <div class="app-title">Sozialplaner</div>
    <button class="active" data-route="#/">Übersicht</button>
    <button data-route="#/suggest">Vorschlag</button>
    <button data-route="#/friends">Freunde</button>
    <button data-route="#/activities">Aktivitäten</button>
    <button data-route="#/events">Kalender</button>
    <button data-route="#/log">Verlauf</button>
    <div class="nav-user">
      <span class="nav-user-email" id="user-email"></span>
      <button class="btn btn-sm btn-ghost" id="logout-btn" style="color:var(--danger);">Abmelden</button>
    </div>
  </nav>

  <!-- View container — views render here -->
  <div id="view-container"></div>

  <!-- MODALS -->
  <div class="modal-bg" id="person-modal">
    <div class="modal">
      <div class="modal-title" id="person-modal-title">Freund hinzufügen</div>
      <input type="hidden" id="p-id"/>
      <div class="form-row">
        <div><label>Name *</label><input id="p-name" placeholder="Vorname Nachname" maxlength="100"/></div>
        <div><label>Geburtstag</label><input id="p-birthday" type="date"/></div>
      </div>
      <div class="form-row">
        <div><label>Wohnort</label><input id="p-city" placeholder="Stadt" maxlength="100"/></div>
        <div><label>Kategorie</label>
          <select id="p-category">
            <option value="friend">Freund</option>
            <option value="romantic">Romantisch</option>
            <option value="family">Familie</option>
            <option value="work">Arbeit</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div><label>Einladen mit</label>
          <select id="p-partner"><option value="solo">Alleine</option><option value="partner">Mit Partner</option><option value="either">Flexibel</option></select>
        </div>
      </div>
      <div class="form-row full" style="margin-bottom:10px;">
        <label>Bevorzugte Wochentage</label>
        <div class="days-toggle" id="p-days">
          <button type="button" class="day-btn" data-day="Mo">Mo</button>
          <button type="button" class="day-btn" data-day="Di">Di</button>
          <button type="button" class="day-btn" data-day="Mi">Mi</button>
          <button type="button" class="day-btn" data-day="Do">Do</button>
          <button type="button" class="day-btn" data-day="Fr">Fr</button>
          <button type="button" class="day-btn" data-day="Sa">Sa</button>
          <button type="button" class="day-btn" data-day="So">So</button>
        </div>
      </div>
      <div class="form-row full"><label>Notizen</label><textarea id="p-notes" placeholder="Interessen, Besonderheiten..." maxlength="1000"></textarea></div>
      <div class="modal-actions">
        <button class="btn" data-modal-close="person-modal">Abbrechen</button>
        <button class="btn btn-primary" id="person-save-btn">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="activity-modal">
    <div class="modal">
      <div class="modal-title" id="activity-modal-title">Aktivität hinzufügen</div>
      <input type="hidden" id="a-id"/>
      <div class="form-row">
        <div><label>Name *</label><input id="a-name" placeholder="z.B. Klettern gehen" maxlength="100"/></div>
        <div><label>Ort</label><input id="a-location" placeholder="z.B. Kletterhalle Berlin" maxlength="200"/></div>
      </div>
      <div class="form-row">
        <div><label>Budget/Person (€)</label><input id="a-budget" type="number" placeholder="20" min="0" max="10000"/></div>
        <div><label>Energie</label><select id="a-energy"><option value="low">Entspannt</option><option value="medium">Aktiv</option><option value="high">Aufwändig</option></select></div>
      </div>
      <div class="form-row">
        <div><label>Min. Personen</label><input id="a-min" type="number" placeholder="2" min="1" max="100"/></div>
        <div><label>Max. Personen</label><input id="a-max" type="number" placeholder="6" min="1" max="100"/></div>
      </div>
      <div class="form-row">
        <div><label>Dauer (h)</label><input id="a-duration" type="number" placeholder="2" step="0.5" min="0" max="48"/></div>
        <div><label>Modus</label>
          <select id="a-mode"><option value="social">Freunde</option><option value="romantic">Romantisch</option><option value="both">Beides</option></select>
        </div>
      </div>
      <div class="form-row">
        <div><label>Indoor/Outdoor</label><select id="a-inout"><option value="indoor">Indoor</option><option value="outdoor">Outdoor</option><option value="both">Beides</option></select></div>
      </div>
      <div class="form-row full"><label>Tags (kommagetrennt)</label><input id="a-tags" placeholder="Sport, Sommer, Gruppe" maxlength="300"/></div>
      <div class="form-row full"><label>Todos / Ressourcen</label><textarea id="a-todos" placeholder="Was wird benötigt?" maxlength="1000"></textarea></div>
      <div class="modal-actions">
        <button class="btn" data-modal-close="activity-modal">Abbrechen</button>
        <button class="btn btn-primary" id="activity-save-btn">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="cal-modal">
    <div class="modal">
      <div class="modal-title">Treffen eintragen</div>
      <div class="form-row">
        <div><label>Datum</label><input id="ce-date" type="date"/></div>
        <div><label>Uhrzeit</label><input id="ce-time" type="time" value="12:00"/></div>
      </div>
      <div class="form-row full"><label>Aktivität</label><select id="ce-activity"></select></div>
      <div class="form-row full">
        <label>Teilnehmer</label>
        <div id="ce-people" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;"></div>
      </div>
      <div class="form-row full"><label>Notiz</label><textarea id="ce-note" placeholder="Was war besonders?" maxlength="1000"></textarea></div>
      <div id="gcal-status" style="display:none;font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:8px;"></div>
      <div class="modal-actions">
        <button class="btn" data-modal-close="cal-modal">Abbrechen</button>
        <button class="btn" id="cal-ics-btn">📅 ICS</button>
        <button class="btn" id="cal-gcal-btn" style="background:#4285f4;color:#fff;border-color:#4285f4;">G Google Cal</button>
        <button class="btn btn-primary" id="cal-save-btn">Speichern</button>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="swap-modal">
    <div class="modal">
      <div class="modal-title">Person tauschen</div>
      <div id="swap-list" style="display:flex;flex-direction:column;gap:8px;"></div>
      <div class="modal-actions"><button class="btn" data-modal-close="swap-modal">Abbrechen</button></div>
    </div>
  </div>

  <div class="modal-bg" id="history-modal">
    <div class="modal">
      <div class="modal-title" id="history-modal-title">Verlauf</div>
      <div id="history-content"></div>
      <div class="modal-actions"><button class="btn btn-primary" data-modal-close="history-modal">Schließen</button></div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
